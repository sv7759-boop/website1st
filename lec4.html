<!-- shadow -->

<br><br>
<button class="shadow">Shadow</button>
<style>
    .shadow{
        cursor: pointer;
        padding-right: 10px;
        padding-left: 10px; 
        padding-top: 5px;   
        padding-bottom: 5px;
        background-color: rgb(0, 118, 0);
        border:none;
        color:white;
        box-shadow: 3px 3px 5px rgba(0, 0, 0, 0.6);
    
    }

    .shadow:active{
        box-shadow:none;
        margin-top: 3px;
        margin-left: 3px;
    }

</style>

<br><br>
<button class="btn">One</button>
<button class="btn">Two</button>
<button class="btn">Three</button>

<style>
.btn{
    position: relative;
    margin: 10px;
    padding: 6px 12px;
    border: none;
    color: white;
    background: transparent;
    cursor: pointer;
}

.btn::before{
    content: "";
    position: absolute;
    inset: 0;
    background-color: rgb(0, 118, 0);
    border-radius: 2px;
    z-index: -1;
    transition: transform 0.15s;
}

.btn:hover::before{
    transform: scaleX(1.2);
}
</style>
